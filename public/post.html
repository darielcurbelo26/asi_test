    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; connect-src 'self'; frame-src 'self';">

    <style>body { display: none; }</style>
    <script>
    (function () {
        var page = 'post.html';
        if (sessionStorage.getItem('tatc-unlocked-' + page) === 'true') {
            document.addEventListener('DOMContentLoaded', function () { document.body.style.display = ''; });
            return;
        }
        fetch('content.json', { cache: 'no-cache' })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var pages = data && data.security && data.security.pages;
                if (pages && pages[page] === 'private') {
                    window.location.replace('password.html?redirect=' + page);
                } else {
                    document.body.style.display = '';
                }
            })
            .catch(function () {
                window.location.replace('password.html?redirect=' + page);
            });
    }());
    </script>
</head>
