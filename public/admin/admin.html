  repo: 'asi_test',

const navSearch = document.getElementById('nav-search');

async function initAdmin() {
  uiEl.classList.add('on');
  await loadData();
  PROJECT_DETAIL_TEMPLATE = (DATA.projects_detail && DATA.projects_detail['a-sweet-kid']) ? deepClone(DATA.projects_detail['a-sweet-kid']) : null;
  syncProjectDetailsFromProjectsList();
  buildNav();
  renderPanel(NAV[0].id);
  navSearch?.addEventListener('input', () => buildNav());
}

function deepClone(obj){
  try { return JSON.parse(JSON.stringify(obj)); } catch(e) { return obj ? { ...obj } : obj; }
}

function markDirty(on=true){
  IS_DIRTY = !!on;
  document.body.classList.toggle('is-dirty', IS_DIRTY);
  const chip = document.getElementById('admin-chip');
  if (chip) {
    chip.textContent = IS_DIRTY ? 'Unsaved changes' : 'Studio';
    chip.classList.toggle('is-dirty', IS_DIRTY);
  }
}

function extractProjectSlug(link){
  if (!link) return null;
  const m = String(link).match(/[?&](?:project|slug)=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : null;
}

function buildProjectDetailFromTemplate(slug, listItem){
  const base = PROJECT_DETAIL_TEMPLATE ? deepClone(PROJECT_DETAIL_TEMPLATE) : {
    meta_title: '',
    title: '',
    subtitle: '',
    date: '',
    location: '',
    medium: '',
    body: [''],
    gallery_images: []
  };

  base.title = listItem?.title || base.title || slug;
  base.meta_title = `${base.title} — TATC`;
  base.subtitle = '';
  base.date = listItem?.date || '';
  base.location = listItem?.loc || '';
  base.medium = listItem?.desc || '';
  base.body = Array.isArray(base.body) ? base.body.map(()=> '') : [''];
  base.gallery_images = [];
  return base;
}

function syncProjectDetailsFromProjectsList(){
  if (!DATA.projects || !Array.isArray(DATA.projects.items)) return;
  if (!DATA.projects_detail) DATA.projects_detail = {};
  let created = 0;
  DATA.projects.items.forEach((it) => {
    const slug = extractProjectSlug(it.link);
    if (!slug) return;
    if (!DATA.projects_detail[slug]) {
      DATA.projects_detail[slug] = buildProjectDetailFromTemplate(slug, it);
      created++;
    }
  });
  if (created > 0) markDirty(true);
}

// Track edits (unsaved)

  if (!uiEl.classList.contains('on')) return;
  const t = e.target;
  if (!t) return;
  if (t.matches('input, textarea, select')) markDirty(true);
}, true);

function buildNav() {
  const nav = document.getElementById('sb-nav');
  const term = (navSearch?.value || '').trim().toLowerCase();
  let html = '';
  NAV.forEach(n => {
    const haystack = `${n.label} ${n.id} ${n.cat || ''}`.toLowerCase();
    if (term && !haystack.includes(term)) return;
    if (n.cat) html += `<div class="sb-cat">${n.cat}</div>`;
    const viewBtn = n.view ? `<a class="sb-view" href="${n.view}" target="_blank" rel="noopener noreferrer" title="View page">↗</a>` : '';
    html += `<div class="sb-item" data-id="${n.id}" onclick="renderPanel('${n.id}')"><span class="sb-item-lbl">${n.icon}&nbsp;${n.label}</span>${viewBtn}</div>`;
  });
  nav.innerHTML = html;
}

// ── DATA ──
async function loadData() {
  try {
    const draft = localStorage.getItem('tatc_cms');
    if (draft) DATA = JSON.parse(draft);
    const r = await fetch('../content.json?t='+Date.now());
    if (r.ok) {
      const f = await r.json();
      if (!Object.keys(DATA).length) DATA = f;
      else Object.keys(f).forEach(k=>{ if(!(k in DATA)) DATA[k]=f[k]; });
    }
  } catch(e){}
}

function getPublishConfig() {
  try {
    const raw = localStorage.getItem(PUBLISH_CFG_KEY);
    return raw ? { ...PUBLISH_DEFAULTS, ...JSON.parse(raw) } : { ...PUBLISH_DEFAULTS };
  } catch(e) {
    return { ...PUBLISH_DEFAULTS };
  }
}

function savePublishConfig(cfg) {
  localStorage.setItem(PUBLISH_CFG_KEY, JSON.stringify(cfg));
}

function fillPublishConfigFields() {
  const cfg = getPublishConfig();
  const plat = document.getElementById('pub-platform');
  if (plat) plat.value = cfg.platform || 'github';
  sv('pub-owner', cfg.owner);
  sv('pub-repo', cfg.repo);
  sv('pub-branch', cfg.branch);
  sv('pub-message', cfg.commitMessage);
  sv('pub-token', cfg.token);
  sv('pub-hook', cfg.deployHook);
  sv('pub-last', cfg.lastPublished);
  const auto = document.getElementById('pub-auto');
  if (auto) auto.value = cfg.autoPublish ? 'true' : 'false';
  toggleDeployFields();
}

function collectPublishConfig() {
  const current = getPublishConfig();
  const next = {
    ...current,
    platform: gv('pub-platform') || current.platform || 'github',
    owner: gv('pub-owner') || current.owner,
    repo: gv('pub-repo') || current.repo,
    branch: gv('pub-branch') || current.branch,
    commitMessage: gv('pub-message') || current.commitMessage,
    token: gv('pub-token') || current.token,
    deployHook: gv('pub-hook') ?? current.deployHook,
    autoPublish: gv('pub-auto') === 'true'
  };
  savePublishConfig(next);
  return next;
}

function utf8ToBase64(value) {
  const bytes = new TextEncoder().encode(value);
  let binary = '';
  bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
  return btoa(binary);
}

function setButtonsBusy(isBusy) {
  document.querySelectorAll('.btn-save, .btn-export, .admin-ghost-btn').forEach((btn) => {
    if (btn.classList.contains('btn-home')) return;
    btn.disabled = isBusy;
  });
}

function toggleDeployFields() {
  const el = document.getElementById('github-fields');
  if (!el) return;
  el.classList.toggle('hidden', (gv('pub-platform') || 'github') !== 'github');
}

async function triggerDeployHook(url) {
  if (!url) return;
  try { await fetch(url, { method: 'POST' }); }
  catch (e) { console.warn('Deploy hook error:', e.message); }
}

async function publishContentJSON() {
  const cfg = collectPublishConfig();
  if (!cfg.token) {
    setStatus('No GitHub token — see Global Settings → Deploy Settings.', 'warn');
    return false;
  }

  setButtonsBusy(true);
  setStatus('Publishing to GitHub…', 'busy');

  try {
    const endpoint = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/public/content.json`;
    const headers = {
      'Accept': 'application/vnd.github+json',
      'Authorization': `Bearer ${cfg.token}`
    };

    const currentRes = await fetch(`${endpoint}?ref=${encodeURIComponent(cfg.branch)}`, { headers });
    if (!currentRes.ok) {
      throw new Error(`Could not read public/content.json (${currentRes.status})`);
    }
    const current = await currentRes.json();

    const body = {
      message: cfg.commitMessage || 'Update site content from admin',
      content: utf8ToBase64(JSON.stringify(DATA, null, 2)),
      sha: current.sha,
      branch: cfg.branch
    };

    const publishRes = await fetch(endpoint, {
      method: 'PUT',
      headers: {
        ...headers,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!publishRes.ok) {
      const err = await publishRes.json().catch(() => ({}));
      throw new Error(err.message || `Publish failed (${publishRes.status})`);
    }

    const stamp = new Date().toLocaleString('en-US', { hour12: false });
    const saved = { ...cfg, lastPublished: stamp };
    savePublishConfig(saved);
    const pubLast = document.getElementById('pub-last');
    if (pubLast) pubLast.value = stamp;
    markDirty(false);
    setStatus('Published — deploy triggered.', 'ok');
    if (cfg.deployHook) await triggerDeployHook(cfg.deployHook);
    return true;
  } catch (err) {
    setStatus(`Publish failed: ${err.message}`, 'err');
    return false;
  } finally {
    setButtonsBusy(false);
  }
}

async function publishLive() {
  if (currentPostSlug) savePost();
  collectAll();
  const cfg = collectPublishConfig();
  localStorage.setItem('tatc_cms', JSON.stringify(DATA));
  if (cfg.platform === 'download') {
    exportJSON();
    setStatus('JSON downloaded — commit and push to deploy.', 'ok');
    return;
  }
  await publishContentJSON();
}

// ── RENDER PANEL ──
function renderPanel(id) {
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active', el.dataset.id===id));
  const main = document.getElementById('main-area');
  const fn = PANELS[id];
  if (!fn) return;
  main.innerHTML = `${getOverviewCards(id)}<div id="p-${id}" class="panel active">${fn()}</div>`;
  const lbl = document.getElementById('sb-active-label');
  if (lbl) lbl.textContent = NAV.find(n => n.id === id)?.label || id;
  fillPanel(id);
}

// ── VIS MATRIX ──
const ALL_PAGES = ['index.html','projects.html','artist.html','blog.html','a-sweet-kid.html','a-sweet-kid-online.html','password.html'];
function renderVisMatrix(s) {
  const pages = s.pages||{}, pwds = s.page_passwords||{};
  const el = document.getElementById('vis-body');
  if (!el) return;
  el.innerHTML = ALL_PAGES.map(p => {
    const v = pages[p]||'public';
    const pw = pwds[p]||'';
    const isPrivate = v === 'private';
    return `<tr>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:.78rem">${p}</td>
      <td><span class="badge ${v}">${v}</span></td>
      <td><select class="fs" style="width:auto;padding:.3rem .6rem;font-size:.78rem" onchange="setVis('${p}',this.value)">
        <option value="public" ${!isPrivate?'selected':''}>Public</option>
        <option value="private" ${isPrivate?'selected':''}>Private</option>
      </select></td>
      <td>${isPrivate
        ? `<input class="fi" style="padding:.3rem .6rem;font-size:.78rem;width:140px" placeholder="(use default)" value="${esc(pw)}" oninput="setPagePw('${p}',this.value)">`
        : `<span style="color:rgba(255,255,255,.15);font-size:.75rem">—</span>`
      }</td>
    </tr>`;
  }).join('');
}
function setVis(p,v) {
  if(!DATA.security)DATA.security={};
  if(!DATA.security.pages)DATA.security.pages={};
  DATA.security.pages[p]=v;
  renderVisMatrix(DATA.security);
}
function setPagePw(p,v) {
  if(!DATA.security)DATA.security={};
  if(!DATA.security.page_passwords)DATA.security.page_passwords={};
  if(v) DATA.security.page_passwords[p]=v;
  else delete DATA.security.page_passwords[p];
}

// ── TYPOGRAPHY ──
function fillTypo(ty) {
  ['heading_h1','heading_h2','nav','body','label'].forEach(k=>{
    const t=ty[k]||{};
    sv(`ty-${k}-size`,t.font_size||'');sv(`ty-${k}-weight`,t.font_weight||'');
    sv(`ty-${k}-spacing`,t.letter_spacing||'');
    const sel=document.getElementById(`ty-${k}-transform`);
    if(sel)sel.value=t.text_transform||'none';
    previewTypo(k);
  });
}
function previewTypo(k) {
  const el=document.getElementById(`tp-${k}`);
  if(!el)return;
  const sz=gv(`ty-${k}-size`)||'1rem', wt=gv(`ty-${k}-weight`)||'400', sp=gv(`ty-${k}-spacing`)||'0';
  const tt=gv(`ty-${k}-transform`)||'none';
  el.style.cssText=`font-size:${sz};font-weight:${wt};letter-spacing:${sp};text-transform:${tt};color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis`;
  el.textContent='The quick brown fox';
}

function moveBlog(i,d){const p=DATA.blog.posts,ni=i+d;if(ni<0||ni>=p.length)return;[p[i],p[ni]]=[p[ni],p[i]];renderBlogPostList();}

    <button class="btn-accent" style="font-size:.75rem;padding:.4rem .8rem;background:rgba(255,255,255,.08)" onclick="addBlock('pullquote')">+ Quote</button>
    <button class="btn-accent" style="font-size:.75rem;padding:.4rem .8rem;background:rgba(255,255,255,.08)" onclick="addBlock('image')">+ Image</button>
    <button class="btn-accent" style="font-size:.75rem;padding:.4rem .8rem;background:var(--adm-ok);margin-left:auto" onclick="savePost()">✓ Save Post</button>

}
function closePostEditor(){currentPostSlug=null;document.getElementById('post-editor').style.display='none';document.getElementById('posts-list').style.display='block';}
function renderPostBlocks(blocks){
  const el=document.getElementById('pe-blocks');if(!el)return;
  el.innerHTML=blocks.map((b,i)=>{
    const hd=`<div class="block-item"><div class="block-head"><span class="block-type">${b.type}</span><div style="display:flex;gap:.4rem">
      <button class="btn-sm" onclick="moveBlock(${i},-1)">↑</button><button class="btn-sm" onclick="moveBlock(${i},1)">↓</button>
      <button class="btn-sm danger" onclick="removeBlock(${i})">✕</button></div></div>`;
    if(b.type==='paragraph'||b.type==='pullquote') return hd+`<textarea class="ft" id="blk-${i}" style="min-height:80px">${esc(b.text||'')}</textarea></div>`;
    if(b.type==='image') return hd+`<div class="grid2" style="gap:.5rem">
      <div class="fld"><label>Image Path</label><input class="fi" id="blk-${i}-src" value="${esc(b.src||'')}"></div>
      <div class="fld"><label>Alt Text</label><input class="fi" id="blk-${i}-alt" value="${esc(b.alt||'')}"></div>
      <div class="fld" style="grid-column:1/-1"><label>Caption</label><input class="fi" id="blk-${i}-cap" value="${esc(b.caption||'')}"></div>
    </div></div>`;
    return hd+'</div>';
  }).join('');
}
function addBlock(type){if(!currentPostSlug)return;const body=DATA.post?.posts?.[currentPostSlug]?.body;if(!body)return;
  if(type==='paragraph')body.push({type,text:''});else if(type==='pullquote')body.push({type,text:'"..."'});else body.push({type,src:'',alt:'',caption:''});
  renderPostBlocks(body);}
function moveBlock(i,d){const body=DATA.post?.posts?.[currentPostSlug]?.body;if(!body)return;const ni=i+d;if(ni<0||ni>=body.length)return;[body[i],body[ni]]=[body[ni],body[i]];renderPostBlocks(body);}
function removeBlock(i){const body=DATA.post?.posts?.[currentPostSlug]?.body;if(!body)return;body.splice(i,1);renderPostBlocks(body);}
function savePost(){if(!currentPostSlug)return;
  const post=DATA.post.posts[currentPostSlug];
  post.meta_title=gv('pe-meta');post.subject=gv('pe-subject');post.date=gv('pe-date');post.title=gv('pe-title');
  post.footer_label=gv('pe-footer-lbl');post.footer_credit=gv('pe-footer-cred');
  const be=DATA.blog?.posts?.find(p=>p.slug===currentPostSlug);
  if(be){be.summary=gv('pe-summary');be.date=post.date;be.title=post.title;}
  const body=post.body||[];
  body.forEach((b,i)=>{
    if(b.type==='paragraph'||b.type==='pullquote')b.text=gv(`blk-${i}`)||'';
    if(b.type==='image'){b.src=gv(`blk-${i}-src`);b.alt=gv(`blk-${i}-alt`);b.caption=gv(`blk-${i}-cap`);}
  });
  document.getElementById('pe-heading').textContent=post.title;setStatus('Post saved','ok');}

// ── COLLECT ALL ──
function collectAll(){
  const setValueIfPresent = (target, key, id) => {
    const value = gv(id);
    if (value !== null) target[key] = value;
  };

  const g=DATA.global||{};DATA.global=g;
  g.social = g.social || {};
  g.nav = g.nav || {};
  setValueIfPresent(g, 'brand', 'g-brand');
  setValueIfPresent(g, 'tagline', 'g-tagline');
  setValueIfPresent(g, 'year', 'g-year');
  setValueIfPresent(g.social, 'twitter', 'g-tw');
  setValueIfPresent(g.social, 'instagram', 'g-ig');
  setValueIfPresent(g.social, 'email', 'g-email');
  setValueIfPresent(g.nav, 'blog', 'g-nav-blog');
  setValueIfPresent(g.nav, 'projects', 'g-nav-projects');
  setValueIfPresent(g.nav, 'info', 'g-nav-info');

  const s=DATA.security||{};DATA.security=s;
  setValueIfPresent(s, 'gate_password', 'sec-pass');
  setValueIfPresent(s, 'gate_title', 'sec-title');
  setValueIfPresent(s, 'gate_description', 'sec-desc');
  setValueIfPresent(s, 'admin_password', 'sec-admin-pass');
  setValueIfPresent(s, 'admin_recovery_code', 'sec-admin-recovery');
  const maxAttempts = gv('sec-max-attempts'); if (maxAttempts !== null) s.max_attempts = parseInt(maxAttempts, 10) || 5;
  const lockoutMins = gv('sec-lockout-mins'); if (lockoutMins !== null) s.lockout_minutes = parseInt(lockoutMins, 10) || 30;
  const hintAfter = gv('sec-hint-after'); if (hintAfter !== null) s.hint_after_attempts = parseInt(hintAfter, 10) || 3;
  setValueIfPresent(s, 'password_hint', 'sec-hint-text');
  setValueIfPresent(s, 'recovery_code', 'sec-recovery-code');
  setValueIfPresent(s, 'recovery_email', 'sec-recovery-email');
  setValueIfPresent(s, 'gate_title', 'pw-title');
  setValueIfPresent(s, 'gate_description', 'pw-desc');
  setValueIfPresent(s, 'gate_password', 'pw-pass');

  const h=DATA.home||{};DATA.home=h;
  setValueIfPresent(h, 'meta_title', 'h-meta');
  setValueIfPresent(h, 'hero_headline', 'h-hero');
  setValueIfPresent(h, 'loader_text', 'h-loader');
  setValueIfPresent(h, 'loader_skip_label', 'h-skip');

  const b=DATA.blog||{};DATA.blog=b;
  setValueIfPresent(b, 'meta_title', 'b-meta');
  setValueIfPresent(b, 'page_title', 'b-title');
  setValueIfPresent(b, 'page_label', 'b-label');

  const g3=DATA.gallery_3d||{};DATA.gallery_3d=g3;
  setValueIfPresent(g3, 'meta_title', 'gal-meta');
  setValueIfPresent(g3, 'hud_label', 'gal-hud');
  setValueIfPresent(g3, 'loader_text', 'gal-loader');
  setValueIfPresent(g3, 'credits', 'gal-credits');
  setValueIfPresent(g3, 'audio_src', 'gal-audio');

  const hasTypoFields = document.getElementById('ty-heading_h1-size');
  if (hasTypoFields) {
    const ty={};DATA.typography=ty;
    ['heading_h1','heading_h2','nav','body','label'].forEach(k=>{
      ty[k]={
        font_size:gv(`ty-${k}-size`) || '',
        font_weight:gv(`ty-${k}-weight`) || '',
        letter_spacing:gv(`ty-${k}-spacing`) || '',
        text_transform:gv(`ty-${k}-transform`) || 'none'
      };
    });
  }

  const ar=DATA.artist||{};DATA.artist=ar;
  setValueIfPresent(ar, 'name', 'ar-name');
  setValueIfPresent(ar, 'label', 'ar-label');
  setValueIfPresent(ar, 'bio1', 'ar-bio1');
  setValueIfPresent(ar, 'bio2', 'ar-bio2');
}

async function saveAll(){
  if(currentPostSlug)savePost();
  collectAll();
  const publishCfg = collectPublishConfig();
  localStorage.setItem('tatc_cms', JSON.stringify(DATA));
  markDirty(false);
  setStatus('Draft saved.','ok');
  if (publishCfg.autoPublish) {
    if (publishCfg.platform === 'download') { exportJSON(); }
    else { await publishContentJSON(); }
  }
}

function exportJSON(){
  if(currentPostSlug)savePost();
  collectAll();
  collectPublishConfig();
  localStorage.setItem('tatc_cms', JSON.stringify(DATA));
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='content.json';a.click();
  URL.revokeObjectURL(url);
  setStatus('content.json exported ↓','ok');
}

// ── UTILS ──
function sv(id,val){ const el=document.getElementById(id); if(el&&val!==undefined&&val!==null)el.value=val; }
function gv(id){ const el=document.getElementById(id); return el ? el.value : null; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function livePreview(){}

let stTimer;
function setStatus(msg,type=''){
  const el=document.getElementById('sb-status');
  el.textContent=msg;el.className=type;
  clearTimeout(stTimer);stTimer=setTimeout(()=>{el.textContent='';el.className='';},3500);
}

document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveAll();} });
</script>
