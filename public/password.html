        <section class="password-page-content">
            <div class="launch-info">LAUNCHING ON FEBRUARY 7TH AT 7PM CST</div>
            <h1 class="section_hero-title-password">ASWEETKID</h1>

            <form id="pForm" class="password-form" novalidate>
                <div class="input-wrapper">
                    <input type="password" id="pInput" class="password-field" placeholder="This is the password" autocomplete="current-password" spellcheck="false" required>

                    <div class="toggle-password-v" id="tPass" role="button" tabindex="0" aria-label="Show password" aria-pressed="false">
                        <svg id="eOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="eClosed" style="display:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.94"></path>
                            <path d="M1 1l22 22"></path>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-4.87 6.86"></path>
                            <path d="M14.12 14.12a3 3 0 0 1-4.24-4.24"></path>
                        </svg>
                    </div>
                </div>

                <button class="enter-button" type="submit">ENTER</button>
            </form>

            <p id="gate-hint" class="gate-hint" style="display:none" aria-live="polite"></p>

            <div id="gate-lockout" class="gate-lockout" style="display:none" role="alert" aria-live="assertive">
                <span class="gate-lockout-icon">&#x1F512;</span>
                <span>Too many failed attempts. Try again in <strong id="gate-countdown">--:--</strong>.</span>
            </div>

            <div id="gate-recovery" class="gate-recovery" style="display:none">
                Need access? <a href="mailto:" class="gate-recovery-link">Contact us</a>
            </div>
        </section>
