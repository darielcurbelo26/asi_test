            <div class="nav_button difference-text" id="nav_button-menu">

                <div></div>
                <div></div>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <!-- Toggles at the bottom left -->
        <div class="fixed-controls_component">
            <div class="icon-button is-square" title="Toggle Theme"></div>
        </div>

        <!-- Right Navbar Sidebar -->
        <nav class="nav_menu">
            <div class="nav_container nav_menu-container">
                <div class="nav_list">
                    <a href="index.html" class="text-style-nav nav_link">
                        <span class="hover-split-text">
                            <span class="text-inner">The gist</span>
                            <span class="text-outer">The gist</span>
                        </span>
                    </a>
                    <a href="projects.html" class="text-style-nav nav_link">
                        <span class="hover-split-text">
                            <span class="text-inner">Projects</span>
                            <span class="text-outer">Projects</span>
                        </span>
                    </a>
                    <a href="about.html" class="text-style-nav nav_link">
                        <span class="hover-split-text">
                            <span class="text-inner">Info</span>
                            <span class="text-outer">Info</span>
                        </span>
                    </a>
                </div>
                <div class="nav_list social_list">
                    <a href="https://x.com" target="_blank" class="social_link"><img src="assets/social_icons/xx.svg"
                            alt="xx"></a>
                    <a href="mailto:ejemplo@correo.com" class="social_link"><img src="assets/social_icons/mail.svg"
                            alt="mail"></a>
                    <a href="https://instagram.com" target="_blank" class="social_link"><img
                            src="assets/social_icons/instagram.svg" alt="instagram"></a>
                </div>
            </div>
        </nav>

        <section class="password-page-content">
            <div class="launch-info">LAUNCHING ON FEBRUARY 7TH AT 7PM CST</div>
            <h1 class="section_hero-title-password">ASWEETKID</h1>

            <form id="pForm" class="password-form">
                <div class="input-wrapper">
                    <input type="password" id="pInput" class="password-field" placeholder="This is the password">
                    <div class="toggle-password-v" id="tPass">
                        <!-- Eye icon SVG -->
                        <svg id="eOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="eClosed" style="display:none;" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    <script src="scripts/password.js"></script>
            }
        });

        // Password visibility toggle logic
        const tPass = document.getElementById('tPass');
        const eOpen = document.getElementById('eOpen');
        const eClosed = document.getElementById('eClosed');

        tPass.addEventListener('click', () => {
            const isPassword = pInput.type === 'password';
            pInput.type = isPassword ? 'text' : 'password';
            eOpen.style.display = isPassword ? 'none' : 'block';
            eClosed.style.display = isPassword ? 'block' : 'none';
        });
    </script>
</body>

</html>
