<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TATC</title>
<link rel="icon" type="image/svg+xml" href="assets/fav_icon/red-circle.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Inter:ital,slnt,wght@0,0,100..900;1,0,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/a-sweet-kid-online.css">
</head>
<body>

  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; connect-src 'self'; frame-src 'self';">
<canvas id="canvas"></canvas>
<div id="cursor"></div>

<div id="loader">
  <div class="l-wrap">
    <div class="l-wordmark">A Sweet Kid</div>
    <div class="l-bar"><div class="l-fill" id="lfill"></div></div>
  </div>
</div>

<!-- HUD -->
<div id="hud-tl">A Sweet Kid — Immersive</div>
<div id="hud-tr">
  <button class="hud-btn" id="btn-audio">Ambient</button>
  <button class="hud-btn" id="btn-exit">Exit</button>
</div>

<!-- corner navigation — visible only in focus mode -->
<button id="fb-prev" class="fb-prev">&#8592; Prev</button>
<button id="fb-next" class="fb-next">Next &#8594;</button>

<!-- focused mode top bar (count + room) -->
<div id="focus-bar">
  <span class="fb-count" id="fb-count">1 / 3</span>
  <span id="focus-sep" aria-hidden="true"></span>
  <button id="btn-room">Room</button>
</div>

<div id="caption">
  <div class="cap-title" id="cap-title"></div>
  <div class="cap-sub" id="cap-sub"></div>
</div>

<div id="audio-viz">
  <div class="a-bar" style="animation-duration:.7s"></div>
  <div class="a-bar" style="animation-duration:1s"></div>
  <div class="a-bar" style="animation-duration:.85s"></div>
  <div class="a-bar" style="animation-duration:1.1s"></div>
</div>
<div id="hud-br">ISEEASI // 2026</div>

<div id="hint">Drag to rotate — click to focus</div>

    <audio id="audio" loop src="projects/a-sweet-kid-online/audio/ambient.mp3"></audio>

<script type="module" src="scripts/a-sweet-kid-online.js"></script>
</body>
</html>
